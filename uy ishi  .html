<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="">
        <thead>
            <tr>
               <th>Name</th>
               <th>Age</th>
               <th>Country</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Harry Depp</td>
                <td>28</td>
                <td>Britian</td>
            </tr>

            <tr>
                <td>John Smith</td>
                <td>35</td>
                <td>USA</td>
            </tr>

            <tr>
                <td>Ram Krishna</td>
                <td>19</td>
                <td>Nepal</td>
            </tr>
        </tbody>
    </table>
    <br>
    <hr>
    <br>
    <table border="">
        <thead>
            <tr>
                <th>Product</th>
                <th>Flavors</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="4">Milk</td>
                <td>Almond</td>
            </tr>

            <tr>
                <td>Mango</td>
            </tr>

            <tr>
                <td>Chocolate</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">These are exslusive flavors</th>
            </tr>
        </tfoot>
    </table>
    <br>
    <hr>
    <br>
    <table border="">
        <thead>
            <tr>
                <th>Month</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>June</td>
                <td>10.06.1018</td>
            </tr>

            <tr>
                <td>July</td>
                <td>20.07.1012</td>
            </tr>
        </tbody>
    </table>
    <br>
    <hr>
    <br>
    <table border="">
        <thead>
            <tr>
                <th colspan="2">Person Details</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Name</td>
                <td>John Doe</td>
            </tr>

            <tr>
                <td rowspan="3">Phone</td>

            </tr>

            <tr>
                <td>123-456-780</td>
            </tr>

            <tr>
                <td>123-456-789</td>
            </tr>
        </tbody>
    </table>
